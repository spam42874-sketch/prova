<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpeedLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #252830;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff3366;
    --text: #e8eaf0;
    --muted: #5a5f72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .gps-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  .dot.searching { background: var(--accent2); animation: pulse 0.6s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 16px;
    gap: 12px;
  }

  /* Speedometer */
  .speed-display {
    text-align: center;
    position: relative;
  }

  .speed-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(64px, 18vw, 96px);
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.5);
    transition: color 0.2s;
  }

  .speed-num.above-threshold { color: var(--green); text-shadow: 0 0 30px rgba(0,255,136,0.5); }

  .speed-unit {
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--muted);
    font-weight: 600;
  }

  .speed-meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 6px;
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
  }

  .speed-meta span { color: var(--text); }

  /* Controls row */
  .controls {
    display: flex;
    gap: 10px;
    align-items: stretch;
    flex-shrink: 0;
  }

  .threshold-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    flex: 1;
  }

  .threshold-group label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    white-space: nowrap;
  }

  .threshold-group input {
    background: transparent;
    border: none;
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    width: 60px;
    text-align: center;
    outline: none;
  }

  .threshold-group input::-webkit-inner-spin-button,
  .threshold-group input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .btn {
    padding: 10px 18px;
    border: 1px solid;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .btn-start {
    background: rgba(0,255,136,0.1);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-start:hover, .btn-start.active {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  .btn-stop {
    background: rgba(255,51,102,0.1);
    border-color: var(--red);
    color: var(--red);
  }
  .btn-stop:hover {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,51,102,0.4);
  }

  .btn-clear {
    background: rgba(90,95,114,0.1);
    border-color: var(--muted);
    color: var(--muted);
    font-size: 12px;
    padding: 10px 12px;
  }
  .btn-clear:hover { border-color: var(--text); color: var(--text); }

  /* Recording indicator */
  .rec-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 8px;
    flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
  }
  .rec-bar.show { display: flex; }

  .rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 0.8s infinite;
    flex-shrink: 0;
  }

  .rec-info { color: var(--muted); flex: 1; }
  .rec-info span { color: var(--green); }

  .elapsed {
    font-size: 20px;
    color: var(--accent);
  }

  /* Chart */
  .chart-container {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    min-height: 0;
    position: relative;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .chart-title {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .max-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 4px;
    padding: 2px 8px;
  }

  canvas { max-height: 100%; }

  /* Log table */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    flex-shrink: 0;
    max-height: 120px;
    overflow-y: auto;
  }

  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-row {
    display: flex;
    padding: 5px 12px;
    border-bottom: 1px solid rgba(37,40,48,0.5);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    gap: 12px;
    align-items: center;
  }
  .log-row:last-child { border-bottom: none; }

  .log-kmh { color: var(--accent); width: 55px; }
  .log-time { color: var(--green); flex: 1; }
  .log-delta { color: var(--muted); }
  .log-empty {
    padding: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SpeedLog v0.1</div>
  <div class="gps-status">
    <div class="dot" id="gpsDot"></div>
    <span id="gpsLabel">GPS OFF</span>
  </div>
</header>

<div class="main">

  <!-- Speed display -->
  <div class="speed-display">
    <div class="speed-num" id="speedNum">0</div>
    <div class="speed-unit">KM/H</div>
    <div class="speed-meta">
      MAX: <span id="maxSpeed">0</span> &nbsp;|&nbsp; ACC: <span id="accVal">—</span> m/s²
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="threshold-group">
      <label>SOGLIA</label>
      <input type="number" id="thresholdInput" value="40" min="0" max="300">
      <label style="color:var(--muted);font-size:11px;">km/h</label>
    </div>
    <button class="btn btn-start" id="btnStart" onclick="startTracking()">▶ START</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopTracking()" style="display:none">■ STOP</button>
    <button class="btn btn-clear" onclick="clearData()">↺</button>
  </div>

  <!-- Recording bar -->
  <div class="rec-bar" id="recBar">
    <div class="rec-dot"></div>
    <div class="rec-info">REC &nbsp;|&nbsp; soglia <span id="recThresh">40</span> km/h &nbsp;|&nbsp; picco <span id="recMax">0</span> km/h</div>
    <div class="elapsed" id="elapsedTime">0.000s</div>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <div class="chart-header">
      <div class="chart-title">VELOCITÀ / TEMPO</div>
      <div class="max-badge" id="maxBadge">MAX: — km/h</div>
    </div>
    <canvas id="myChart"></canvas>
  </div>

  <!-- Log -->
  <div class="log-panel" id="logPanel">
    <div class="log-empty" id="logEmpty">nessun dato registrato</div>
  </div>

</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let watchId        = null;
let isTracking     = false;
let isRecording    = false;

// Interpolation: we always keep the PREVIOUS GPS sample to interpolate between
let prevGpsKmh     = null;   // speed in km/h at previous GPS fix
let prevGpsTs      = null;   // pos.timestamp (ms) at previous GPS fix

// Recording start is the interpolated moment we crossed the threshold
let recordingStartTs = null; // pos.timestamp (ms) of threshold crossing

let lastRecordedKmh = null;  // last integer km/h we have already saved
let maxSpeedSession  = 0;

const speedData = []; // { kmh: int, time_ms: float }  ← milliseconds, 3 decimals

// ── Chart ────────────────────────────────────────────────────────────────────
const ctx = document.getElementById('myChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [{
      label: 'Velocità',
      data: [],
      borderColor: '#00e5ff',
      backgroundColor: 'rgba(0,229,255,0.07)',
      borderWidth: 2.5,
      pointRadius: 0,        // ← nessun punto
      pointHoverRadius: 4,
      tension: 0.35,
      fill: true,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 200 },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1d24',
        titleColor: '#00e5ff',
        bodyColor: '#e8eaf0',
        borderColor: '#252830',
        borderWidth: 1,
        callbacks: {
          title: items => items[0].raw.y + ' km/h',
          label: item  => 'T+ ' + (item.raw.x / 1000).toFixed(3) + 's'
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        title: { display: true, text: 'Tempo (s)', color: '#5a5f72',
                 font: { family: 'Share Tech Mono', size: 11 } },
        grid: { color: 'rgba(37,40,48,0.9)' },
        ticks: {
          color: '#5a5f72',
          font: { family: 'Share Tech Mono', size: 10 },
          callback: v => (v / 1000).toFixed(1) + 's'
        }
      },
      y: {
        title: { display: true, text: 'km/h', color: '#5a5f72',
                 font: { family: 'Share Tech Mono', size: 11 } },
        grid: { color: 'rgba(37,40,48,0.9)' },
        ticks: { color: '#5a5f72', font: { family: 'Share Tech Mono', size: 10 } },
        beginAtZero: false
      }
    }
  }
});

// ── Controls ──────────────────────────────────────────────────────────────────
function startTracking() {
  if (!navigator.geolocation) { alert('Geolocalizzazione non supportata.'); return; }
  isTracking = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display  = '';
  document.getElementById('gpsDot').className  = 'dot searching';
  document.getElementById('gpsLabel').textContent = 'RICERCA...';

  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });

  elapsedLoop();
}

function stopTracking() {
  isTracking  = false;
  isRecording = false;
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display  = 'none';
  document.getElementById('recBar').classList.remove('show');
  document.getElementById('gpsDot').className  = 'dot';
  document.getElementById('gpsLabel').textContent = 'GPS OFF';
}

function clearData() {
  speedData.length  = 0;
  maxSpeedSession   = 0;
  lastRecordedKmh   = null;
  isRecording       = false;
  recordingStartTs  = null;
  prevGpsKmh        = null;
  prevGpsTs         = null;
  document.getElementById('recBar').classList.remove('show');
  document.getElementById('maxSpeed').textContent  = '0';
  document.getElementById('maxBadge').textContent  = 'MAX: — km/h';
  chart.data.datasets[0].data = [];
  chart.update();
  renderLog();
}

// ── GPS callback ──────────────────────────────────────────────────────────────
function onPosition(pos) {
  document.getElementById('gpsDot').className  = 'dot active';
  document.getElementById('gpsLabel').textContent = 'GPS LIVE';

  const curKmh  = (pos.coords.speed || 0) * 3.6;
  const curTs   = pos.timestamp;                  // ms, from GPS epoch
  const thresh  = parseFloat(document.getElementById('thresholdInput').value) || 40;

  // ── display ──
  const el = document.getElementById('speedNum');
  el.textContent  = Math.round(curKmh);
  el.className    = 'speed-num' + (isRecording ? ' above-threshold' : '');

  // acceleration
  if (prevGpsTs !== null) {
    const dt  = (curTs - prevGpsTs) / 1000;
    const acc = dt > 0 ? (((curKmh - prevGpsKmh) / 3.6) / dt).toFixed(2) : '—';
    document.getElementById('accVal').textContent = acc;
  }

  if (curKmh > maxSpeedSession) {
    maxSpeedSession = curKmh;
    document.getElementById('maxSpeed').textContent = Math.round(maxSpeedSession);
    document.getElementById('maxBadge').textContent = 'MAX: ' + Math.round(maxSpeedSession) + ' km/h';
  }

  // ── interpolation helper ──────────────────────────────────────────────────
  // Returns the exact pos.timestamp (ms) when speed crossed targetKmh,
  // interpolating linearly between (prevGpsTs, prevGpsKmh) and (curTs, curKmh).
  function interpolateTs(targetKmh) {
    if (prevGpsKmh === null || prevGpsKmh === curKmh) return curTs;
    const ratio = (targetKmh - prevGpsKmh) / (curKmh - prevGpsKmh);
    return prevGpsTs + ratio * (curTs - prevGpsTs);
  }

  // ── recording state machine ───────────────────────────────────────────────
  if (!isRecording) {
    // Did we cross the threshold between the previous fix and this one?
    const crossedUp = prevGpsKmh !== null && prevGpsKmh < thresh && curKmh >= thresh;
    const alreadyAbove = prevGpsKmh === null && curKmh >= thresh;

    if (crossedUp || alreadyAbove) {
      isRecording     = true;
      // Exact crossing timestamp via interpolation
      recordingStartTs = crossedUp ? interpolateTs(thresh) : curTs;
      lastRecordedKmh  = Math.floor(thresh);

      document.getElementById('recBar').classList.add('show');
      document.getElementById('recThresh').textContent = thresh;
      document.getElementById('recMax').textContent    = '0';

      // Record the threshold crossing itself (t = 0.000)
      addDataPoint(Math.floor(thresh), 0);
      lastRecordedKmh = Math.floor(thresh);
    }
  }

  if (isRecording) {
    document.getElementById('recMax').textContent = Math.round(maxSpeedSession);

    // For each integer km/h we just swept through, compute its exact crossing time
    const curFloor = Math.floor(curKmh);
    if (curFloor > lastRecordedKmh) {
      for (let k = lastRecordedKmh + 1; k <= curFloor; k++) {
        // Interpolate the exact timestamp when speed == k km/h
        const crossTs   = interpolateTs(k);
        const elapsed   = crossTs - recordingStartTs;  // ms, float
        addDataPoint(k, elapsed);
      }
      lastRecordedKmh = curFloor;
    }

    // Auto-stop if we drop 5 km/h below threshold
    if (curKmh < thresh - 5) {
      isRecording = false;
    }
  }

  // Save previous sample for next interpolation
  prevGpsKmh = curKmh;
  prevGpsTs  = curTs;
}

// ── Add data point ────────────────────────────────────────────────────────────
function addDataPoint(kmh, elapsed_ms) {
  // elapsed_ms comes from GPS timestamps → millisecond precision, 3 decimal places
  speedData.push({ kmh, time_ms: elapsed_ms });
  chart.data.datasets[0].data.push({ x: elapsed_ms, y: kmh });
  chart.update('none');
  renderLog();
}

// ── Elapsed display (RAF loop) ────────────────────────────────────────────────
function elapsedLoop() {
  if (!isTracking) return;
  if (isRecording && recordingStartTs !== null) {
    // We use Date.now() as a wall-clock proxy; GPS timestamps track this well
    const t = Date.now() - recordingStartTs;
    document.getElementById('elapsedTime').textContent = (t / 1000).toFixed(3) + 's';
  } else {
    document.getElementById('elapsedTime').textContent = '—';
  }
  requestAnimationFrame(elapsedLoop);
}

// ── Log render ────────────────────────────────────────────────────────────────
function renderLog() {
  const panel = document.getElementById('logPanel');
  if (speedData.length === 0) {
    panel.innerHTML = '<div class="log-empty">nessun dato registrato</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < speedData.length; i++) {
    const d     = speedData[i];
    const delta = i === 0 ? null : d.time_ms - speedData[i - 1].time_ms;
    html += `<div class="log-row">
      <div class="log-kmh">${d.kmh} km/h</div>
      <div class="log-time">T+ ${(d.time_ms / 1000).toFixed(3)}s</div>
      <div class="log-delta">${delta === null ? '—' : '+' + (delta / 1000).toFixed(3) + 's'}</div>
    </div>`;
  }
  panel.innerHTML = html;
  panel.scrollTop = panel.scrollHeight;
}

// ── Error handler ─────────────────────────────────────────────────────────────
function onError(err) {
  document.getElementById('gpsDot').className  = 'dot';
  document.getElementById('gpsLabel').textContent = 'ERRORE';
  console.warn('GPS error', err.code, err.message);
}
</script>

</body>
</html>
