<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedLog — Grafico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c0f; --surface: #111318; --border: #252830;
    --accent: #00e5ff; --accent2: #ff6b35; --green: #00ff88;
    --red: #ff3366; --text: #e8eaf0; --muted: #5a5f72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

  body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--accent); }
  .logo span { color: var(--muted); font-size: 14px; letter-spacing: 2px; margin-left: 8px; }

  .main { flex: 1; display: flex; flex-direction: column; padding: 12px 16px; gap: 12px; overflow: hidden; min-height: 0; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 32px 16px; text-align: center; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent); background: rgba(0,229,255,0.04);
  }
  .dropzone input { display: none; }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
  .dropzone-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; color: var(--text); }
  .dropzone-sub   { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 4px; }

  /* Loaded runs */
  .runs-bar {
    display: none; flex-wrap: wrap; gap: 6px; flex-shrink: 0; align-items: center;
  }
  .runs-bar.show { display: flex; }
  .run-chip {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    padding: 3px 10px; border-radius: 4px; border: 1px solid; cursor: pointer;
    transition: all 0.15s; opacity: 0.55;
  }
  .run-chip.active { opacity: 1; }
  .btn-remove {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--muted);
    color: var(--muted); cursor: pointer; background: transparent; margin-left: auto;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); }

  /* Stats row */
  .stats-row {
    display: none; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
  }
  .stats-row.show { display: flex; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; flex: 1; min-width: 100px;
    font-family: 'Share Tech Mono', monospace;
  }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .stat-value { font-size: 20px; color: var(--accent); margin-top: 2px; }
  .stat-unit  { font-size: 11px; color: var(--muted); }

  /* Chart */
  .chart-wrap {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; min-height: 0; display: none;
  }
  .chart-wrap.show { display: block; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .chart-title  { font-size: 12px; letter-spacing: 3px; color: var(--muted); }

  /* Log table */
  .log-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; flex-shrink: 0; max-height: 130px; overflow-y: auto;
    display: none;
  }
  .log-wrap.show { display: block; }
  .log-wrap::-webkit-scrollbar { width: 4px; }
  .log-wrap::-webkit-scrollbar-thumb { background: var(--border); }
  .log-row {
    display: flex; padding: 5px 12px; border-bottom: 1px solid rgba(37,40,48,0.5);
    font-family: 'Share Tech Mono', monospace; font-size: 12px; gap: 12px;
  }
  .log-row:last-child { border-bottom: none; }
  .log-run  { width: 46px; font-weight: 700; }
  .log-kmh  { color: var(--accent); width: 55px; }
  .log-time { color: var(--green); flex: 1; }
  .log-delta{ color: var(--muted); }

  .nav-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    letter-spacing: 2px; color: var(--accent); border: 1px solid var(--accent);
    background: rgba(0,229,255,0.08); border-radius: 6px;
    padding: 6px 12px; text-decoration: none; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<header>
  <div class="logo">SpeedLog <span>GRAFICO</span></div>
  <a class="nav-btn" href="index.html">📍 TRACKER</a>
</header>

<div class="main">

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <input type="file" id="fileInput" accept=".json" multiple onchange="onFiles(this.files)">
    <div class="dropzone-icon">📂</div>
    <div class="dropzone-title">CARICA FILE RUN</div>
    <div class="dropzone-sub">trascina o tocca per scegliere — .json da SpeedLog</div>
  </div>

  <!-- Loaded run chips -->
  <div class="runs-bar" id="runsBar">
    <div class="run-chip active" id="chipAll"
         style="border-color:#5a5f72;color:#5a5f72"
         onclick="selectRun(null)">TUTTI</div>
    <button class="btn-remove" onclick="clearAll()">× RIMUOVI TUTTO</button>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-label">SOGLIA</div>
      <div class="stat-value" id="statThresh">—</div>
      <div class="stat-unit">km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PICCO</div>
      <div class="stat-value" id="statPeak">—</div>
      <div class="stat-unit">km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">DURATA</div>
      <div class="stat-value" id="statDur">—</div>
      <div class="stat-unit">s</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">RUN</div>
      <div class="stat-value" id="statRuns">0</div>
      <div class="stat-unit">caricate</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-wrap" id="chartWrap">
    <div class="chart-header">
      <div class="chart-title">VELOCITÀ / TEMPO</div>
    </div>
    <canvas id="myChart"></canvas>
  </div>

  <!-- Log -->
  <div class="log-wrap" id="logWrap">
    <div id="logBody"></div>
  </div>

</div>

<script>
const RUN_COLORS = [
  '#00e5ff','#00ff88','#ff6b35','#c77dff','#ffce00',
  '#ff3366','#4fc3f7','#a5d6a7','#ffab91','#b39ddb'
];
function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Loaded runs ───────────────────────────────────────────────────────────────
const loadedRuns = [];   // { meta, crossings, raw_gps, color, label }
let   activeIdx  = null; // null = show all

// ── Chart ─────────────────────────────────────────────────────────────────────
const ctx   = document.getElementById('myChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { datasets: [] },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 400 },
    plugins: {
      legend: { display: true, labels: { color:'#5a5f72', font:{family:'Share Tech Mono',size:10}, boxWidth:14, padding:8 } },
      tooltip: {
        mode:'nearest', intersect:false,
        backgroundColor:'#1a1d24', titleColor:'#00e5ff', bodyColor:'#e8eaf0', borderColor:'#252830', borderWidth:1,
        callbacks: {
          title: items => items[0].raw.y + ' km/h',
          label: item  => item.dataset.label + '  T+ ' + (item.raw.x).toFixed(3) + 's'
        }
      }
    },
    scales: {
      x: {
        type:'linear',
        title:{display:true,text:'Tempo (s)',color:'#5a5f72',font:{family:'Share Tech Mono',size:11}},
        grid:{color:'rgba(37,40,48,0.9)'},
        ticks:{color:'#5a5f72',font:{family:'Share Tech Mono',size:10},maxTicksLimit:10,
               callback: v => v.toFixed(1)+'s'}
      },
      y: {
        title:{display:true,text:'km/h',color:'#5a5f72',font:{family:'Share Tech Mono',size:11}},
        grid:{color:'rgba(37,40,48,0.9)'},
        ticks:{color:'#5a5f72',font:{family:'Share Tech Mono',size:10},stepSize:5},
        beginAtZero:false
      }
    }
  }
});

// ── File handling ─────────────────────────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById('dropzone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('dropzone').classList.remove('drag-over'); }
function onDrop(e)      { e.preventDefault(); document.getElementById('dropzone').classList.remove('drag-over'); onFiles(e.dataTransfer.files); }

function onFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.name.endsWith('.json')) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.crossings || !data.meta) { alert('File non valido: ' + f.name); return; }
        loadRun(data, f.name);
      } catch { alert('Errore nel leggere: ' + f.name); }
    };
    reader.readAsText(f);
  });
}

function loadRun(data, filename) {
  const idx   = loadedRuns.length;
  const color = RUN_COLORS[idx % RUN_COLORS.length];
  const label = data.meta.run ? 'Run ' + data.meta.run : filename.replace('.json','');

  loadedRuns.push({ ...data, color, label, filename });

  // Build chart dataset from crossings: x = time_s, y = kmh
  const pts = data.crossings.map(c => ({ x: c.time_s, y: c.kmh }));
  chart.data.datasets.push({
    label, data: pts,
    borderColor: color, backgroundColor: hexToRgba(color, 0.06),
    borderWidth: 2.5, pointRadius: 0, pointHoverRadius: 5,
    pointHoverBackgroundColor: color, tension: 0, fill: false,
  });
  chart.update();

  addChip(idx, color, label);
  updateStats();
  renderLog();

  document.getElementById('chartWrap').classList.add('show');
  document.getElementById('logWrap').classList.add('show');
  document.getElementById('statsRow').classList.add('show');
  document.getElementById('dropzone').style.display = 'none';
}

// ── Chips ─────────────────────────────────────────────────────────────────────
function addChip(idx, color, label) {
  const bar  = document.getElementById('runsBar');
  bar.classList.add('show');
  const chip = document.createElement('div');
  chip.className = 'run-chip';
  chip.id        = 'chip-' + idx;
  chip.textContent = label;
  chip.style.borderColor = color;
  chip.style.color       = color;
  chip.onclick = () => selectRun(idx);
  // Insert before the remove button
  bar.insertBefore(chip, bar.lastElementChild);
}

function selectRun(idx) {
  activeIdx = idx;
  document.getElementById('chipAll').classList.toggle('active', idx === null);
  loadedRuns.forEach((_, i) => {
    const chip = document.getElementById('chip-' + i);
    if (chip) chip.classList.toggle('active', idx === null || i === idx);
    chart.data.datasets[i].hidden = idx !== null && i !== idx;
  });
  chart.update('none');
  updateStats();
  renderLog();
}

function clearAll() {
  loadedRuns.length = 0;
  chart.data.datasets = [];
  chart.update();
  document.getElementById('runsBar').classList.remove('show');
  document.getElementById('runsBar').innerHTML =
    `<div class="run-chip active" id="chipAll" style="border-color:#5a5f72;color:#5a5f72" onclick="selectRun(null)">TUTTI</div>
     <button class="btn-remove" onclick="clearAll()">× RIMUOVI TUTTO</button>`;
  document.getElementById('chartWrap').classList.remove('show');
  document.getElementById('logWrap').classList.remove('show');
  document.getElementById('statsRow').classList.remove('show');
  document.getElementById('dropzone').style.display = '';
  document.getElementById('logBody').innerHTML = '';
  activeIdx = null;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const visible = activeIdx !== null ? [loadedRuns[activeIdx]] : loadedRuns;
  if (!visible.length) return;
  const thresh = Math.min(...visible.map(r => r.meta.threshold_kmh));
  const peak   = Math.max(...visible.map(r => r.meta.peak_kmh));
  const dur    = Math.max(...visible.map(r => r.meta.duration_s));
  document.getElementById('statThresh').textContent = thresh;
  document.getElementById('statPeak').textContent   = peak;
  document.getElementById('statDur').textContent    = dur.toFixed(2);
  document.getElementById('statRuns').textContent   = visible.length;
}

// ── Log ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const body = document.getElementById('logBody');
  const runs = activeIdx !== null ? [[activeIdx, loadedRuns[activeIdx]]] :
               loadedRuns.map((r, i) => [i, r]);
  if (!runs.length) { body.innerHTML = ''; return; }

  let html = '';
  for (const [i, run] of runs) {
    let prevTime = null;
    for (const c of run.crossings) {
      const delta = prevTime !== null
        ? '+' + (c.time_s - prevTime).toFixed(3) + 's' : '—';
      html += `<div class="log-row">
        <div class="log-run" style="color:${run.color}">${run.label}</div>
        <div class="log-kmh">${c.kmh} km/h</div>
        <div class="log-time">T+ ${c.time_s.toFixed(3)}s</div>
        <div class="log-delta">${delta}</div>
      </div>`;
      prevTime = c.time_s;
    }
  }
  body.innerHTML = html;
}
</script>

</body>
</html>
