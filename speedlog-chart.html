<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedLog — Grafico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#0a0c0f;--surface:#111318;--border:#252830;--accent:#00e5ff;--accent2:#ff6b35;--green:#00ff88;--red:#ff3366;--text:#e8eaf0;--muted:#5a5f72}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:20px;font-weight:700;letter-spacing:4px;color:var(--accent)}
.logo span{color:var(--muted);font-size:13px;letter-spacing:2px;margin-left:8px}
.nav-btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--accent);border:1px solid var(--accent);background:rgba(0,229,255,.08);border-radius:6px;padding:5px 10px;text-decoration:none;transition:all .15s}
.nav-btn:hover{background:var(--accent);color:var(--bg)}

/* Tab bar */
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{flex:1;display:flex;flex-direction:column;padding:12px 16px;gap:10px;overflow:hidden;min-height:0}

/* Drop zone */
.dropzone{border:2px dashed var(--border);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent);background:rgba(0,229,255,.04)}
.dropzone input{display:none}
.dropzone-icon{font-size:28px;margin-bottom:6px}
.dropzone-title{font-size:15px;font-weight:700;letter-spacing:2px}
.dropzone-sub{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:3px}

/* Chips bar */
.runs-bar{display:none;flex-wrap:wrap;gap:6px;flex-shrink:0;align-items:center}
.runs-bar.show{display:flex}
.run-chip{font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid;cursor:pointer;transition:all .15s;opacity:.5}
.run-chip.active{opacity:1}
.btn-remove{font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--muted);color:var(--muted);cursor:pointer;background:transparent;margin-left:auto}
.btn-remove:hover{border-color:var(--red);color:var(--red)}

/* Stats */
.stats-row{display:none;gap:8px;flex-shrink:0;flex-wrap:wrap}
.stats-row.show{display:flex}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;min-width:80px;font-family:'Share Tech Mono',monospace}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:2px}
.stat-value{font-size:18px;color:var(--accent);margin-top:1px}
.stat-unit{font-size:10px;color:var(--muted)}

/* Chart */
.chart-wrap{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:0;display:none}
.chart-wrap.show{display:block}

/* Log */
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-shrink:0;max-height:120px;overflow-y:auto;display:none}
.log-wrap.show{display:block}
.log-wrap::-webkit-scrollbar{width:4px}
.log-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.log-row{display:flex;padding:5px 12px;border-bottom:1px solid rgba(37,40,48,.5);font-family:'Share Tech Mono',monospace;font-size:12px;gap:10px}
.log-row:last-child{border-bottom:none}
.log-run{width:70px;font-weight:700}
.log-kmh{color:var(--accent);width:55px}
.log-time{color:var(--green);flex:1}
.log-delta{color:var(--muted)}

/* ── DRAG COMPARE ── */
.drag-compare{flex:1;display:none;flex-direction:column;gap:10px;overflow-y:auto}
.drag-compare.show{display:flex}
.drag-slots{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
.drag-slot{background:var(--surface);border:2px dashed var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace}
.drag-slot:hover,.drag-slot.drag-over{border-color:var(--accent);background:rgba(0,229,255,.04)}
.drag-slot input{display:none}
.drag-slot.loaded{border-style:solid}
.slot-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.slot-name{font-size:13px;font-weight:700}
.slot-sub{font-size:10px;color:var(--muted);margin-top:3px}
.btn-slot-clear{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;margin-top:4px}

/* Comparison table */
.cmp-table{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.cmp-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 12px;background:rgba(37,40,48,.8);font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;gap:8px}
.cmp-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 12px;border-top:1px solid rgba(37,40,48,.5);font-family:'Share Tech Mono',monospace;font-size:12px;gap:8px;align-items:center}
.cmp-preset{color:var(--text);font-size:11px}
.cmp-a{color:var(--accent)}
.cmp-b{color:var(--green)}
.cmp-delta{font-size:11px}
.cmp-delta.better{color:var(--green)}
.cmp-delta.worse{color:var(--red)}
.cmp-delta.same{color:var(--muted)}
.empty-msg{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);text-align:center;padding:20px;letter-spacing:2px}
</style>
</head>
<body>
<header>
  <div class="logo">SpeedLog <span>ANALISI</span></div>
  <a class="nav-btn" href="index.html">📍 TRACKER</a>
</header>

<!-- Tabs -->
<div class="tab-bar">
  <div class="tab active" id="tabGrafico" onclick="switchTab('grafico')">📈 GRAFICO</div>
  <div class="tab"        id="tabDrag"    onclick="switchTab('drag')">🏁 CONFRONTO DRAG</div>
</div>

<!-- ══════════════ GRAFICO TAB ══════════════ -->
<div class="main" id="panelGrafico">
  <div class="dropzone" id="gDropzone" onclick="document.getElementById('gFileInput').click()"
       ondragover="dzOver(event,'gDropzone')" ondragleave="dzLeave('gDropzone')" ondrop="dzDrop(event,'gDropzone','grafico')">
    <input type="file" id="gFileInput" accept=".json" multiple onchange="loadFiles(this.files,'grafico')">
    <div class="dropzone-icon">📂</div>
    <div class="dropzone-title">CARICA FILE GRAFICO</div>
    <div class="dropzone-sub">speedlog_run*.json — trascina o tocca</div>
  </div>

  <div class="runs-bar" id="gRunsBar">
    <div class="run-chip active" id="gChipAll" style="border-color:#5a5f72;color:#5a5f72" onclick="gSelectRun(null)">TUTTI</div>
    <button class="btn-remove" onclick="gClearAll()">× RIMUOVI</button>
  </div>

  <div class="stats-row" id="gStatsRow">
    <div class="stat-card"><div class="stat-label">SOGLIA</div><div class="stat-value" id="gStatThresh">—</div><div class="stat-unit">km/h</div></div>
    <div class="stat-card"><div class="stat-label">PICCO</div><div class="stat-value" id="gStatPeak">—</div><div class="stat-unit">km/h</div></div>
    <div class="stat-card"><div class="stat-label">DURATA</div><div class="stat-value" id="gStatDur">—</div><div class="stat-unit">s</div></div>
    <div class="stat-card"><div class="stat-label">RUN</div><div class="stat-value" id="gStatRuns">0</div><div class="stat-unit">caricate</div></div>
  </div>

  <div class="chart-wrap" id="gChartWrap">
    <canvas id="gChart"></canvas>
  </div>

  <div class="log-wrap" id="gLogWrap"><div id="gLogBody"></div></div>
</div>

<!-- ══════════════ DRAG TAB ══════════════ -->
<div class="main" id="panelDrag" style="display:none">
  <div class="drag-slots">
    <!-- Slot A -->
    <div class="drag-slot" id="slotA" onclick="document.getElementById('fileA').click()"
         ondragover="dzOver(event,'slotA')" ondragleave="dzLeave('slotA')" ondrop="dzDrop(event,'slotA','drag-a')">
      <input type="file" id="fileA" accept=".json" onchange="loadDragSlot('A',this.files[0])">
      <div class="slot-label">RUN A</div>
      <div class="slot-name" id="slotAName">+ Carica</div>
      <div class="slot-sub"  id="slotASub">speedlog_drag*.json</div>
    </div>
    <!-- Slot B -->
    <div class="drag-slot" id="slotB" onclick="document.getElementById('fileB').click()"
         ondragover="dzOver(event,'slotB')" ondragleave="dzLeave('slotB')" ondrop="dzDrop(event,'slotB','drag-b')">
      <input type="file" id="fileB" accept=".json" onchange="loadDragSlot('B',this.files[0])">
      <div class="slot-label">RUN B</div>
      <div class="slot-name" id="slotBName">+ Carica</div>
      <div class="slot-sub"  id="slotBSub">speedlog_drag*.json</div>
    </div>
  </div>

  <div class="drag-compare" id="dragCompare">
    <div class="empty-msg" id="dragEmptyMsg">carica due run drag per confrontarle</div>
    <div id="cmpTableWrap"></div>
  </div>
</div>

<script>
const RUN_COLORS=['#00e5ff','#00ff88','#ff6b35','#c77dff','#ffce00','#ff3366','#4fc3f7','#a5d6a7'];
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}

// ── Tab switch ────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('tabGrafico').classList.toggle('active',t==='grafico');
  document.getElementById('tabDrag').classList.toggle('active',t==='drag');
  document.getElementById('panelGrafico').style.display=t==='grafico'?'flex':'none';
  document.getElementById('panelDrag').style.display   =t==='drag'   ?'flex':'none';
}

// ── Drag-and-drop helpers ─────────────────────────────────
function dzOver(e,id){e.preventDefault();document.getElementById(id).classList.add('drag-over')}
function dzLeave(id){document.getElementById(id).classList.remove('drag-over')}
function dzDrop(e,id,mode){e.preventDefault();dzLeave(id);
  const files=e.dataTransfer.files;
  if (mode==='grafico') loadFiles(files,'grafico');
  else if (mode==='drag-a') loadDragSlot('A',files[0]);
  else if (mode==='drag-b') loadDragSlot('B',files[0]);
}
function loadFiles(files,mode){Array.from(files).forEach(f=>{if(!f.name.endsWith('.json'))return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(mode==='grafico')gLoadRun(d,f.name);}catch{alert('Errore: '+f.name)}};r.readAsText(f)})}

// ══════════════════════════════════════════════════════════
// GRAFICO MODE
// ══════════════════════════════════════════════════════════
const gRuns=[];let gActiveIdx=null;
const gCtx=document.getElementById('gChart').getContext('2d');
const gChart=new Chart(gCtx,{
  type:'line',data:{datasets:[]},
  options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
    plugins:{
      legend:{display:true,labels:{color:'#5a5f72',font:{family:'Share Tech Mono',size:10},boxWidth:14,padding:8}},
      tooltip:{mode:'nearest',intersect:false,backgroundColor:'#1a1d24',titleColor:'#00e5ff',bodyColor:'#e8eaf0',borderColor:'#252830',borderWidth:1,
        callbacks:{title:i=>i[0].raw.y+' km/h',label:i=>i.dataset.label+'  T+ '+i.raw.x.toFixed(3)+'s'}}
    },
    scales:{
      x:{type:'linear',title:{display:true,text:'Tempo (s)',color:'#5a5f72',font:{family:'Share Tech Mono',size:11}},
         grid:{color:'rgba(37,40,48,.9)'},ticks:{color:'#5a5f72',font:{family:'Share Tech Mono',size:10},maxTicksLimit:10,callback:v=>v.toFixed(1)+'s'}},
      y:{title:{display:true,text:'km/h',color:'#5a5f72',font:{family:'Share Tech Mono',size:11}},
         grid:{color:'rgba(37,40,48,.9)'},ticks:{color:'#5a5f72',font:{family:'Share Tech Mono',size:10},stepSize:5},beginAtZero:false}
    }}
});

function gLoadRun(data,filename){
  if (data.meta?.type!=='grafico'&&!data.crossings){alert('File non è di tipo grafico: '+filename);return;}
  const idx=gRuns.length,color=RUN_COLORS[idx%RUN_COLORS.length];
  const label=data.meta?.run?'Run '+data.meta.run:filename.replace('.json','');
  gRuns.push({...data,color,label});
  gChart.data.datasets.push({label,data:data.crossings.map(c=>({x:c.time_s,y:c.kmh})),
    borderColor:color,backgroundColor:hexToRgba(color,.06),borderWidth:2.5,
    pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:color,tension:0,fill:false});
  gChart.update();
  gAddChip(idx,color,label);
  gUpdateStats();gRenderLog();
  document.getElementById('gChartWrap').classList.add('show');
  document.getElementById('gLogWrap').classList.add('show');
  document.getElementById('gStatsRow').classList.add('show');
  document.getElementById('gDropzone').style.display='none';
}
function gAddChip(idx,color,label){
  const bar=document.getElementById('gRunsBar');bar.classList.add('show');
  const c=document.createElement('div');
  c.className='run-chip';c.id='gChip-'+idx;c.textContent=label;
  c.style.borderColor=color;c.style.color=color;c.onclick=()=>gSelectRun(idx);
  bar.insertBefore(c,bar.lastElementChild);
}
function gSelectRun(idx){
  gActiveIdx=idx;
  document.getElementById('gChipAll').classList.toggle('active',idx===null);
  gRuns.forEach((_,i)=>{const c=document.getElementById('gChip-'+i);if(c)c.classList.toggle('active',idx===null||i===idx);gChart.data.datasets[i].hidden=idx!==null&&i!==idx;});
  gChart.update('none');gUpdateStats();gRenderLog();
}
function gClearAll(){
  gRuns.length=0;gChart.data.datasets=[];gChart.update();
  document.getElementById('gRunsBar').classList.remove('show');
  document.getElementById('gRunsBar').innerHTML='<div class="run-chip active" id="gChipAll" style="border-color:#5a5f72;color:#5a5f72" onclick="gSelectRun(null)">TUTTI</div><button class="btn-remove" onclick="gClearAll()">× RIMUOVI</button>';
  ['gChartWrap','gLogWrap','gStatsRow'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('gDropzone').style.display='';
  document.getElementById('gLogBody').innerHTML='';gActiveIdx=null;
}
function gUpdateStats(){
  const vis=gActiveIdx!==null?[gRuns[gActiveIdx]]:gRuns;if(!vis.length)return;
  document.getElementById('gStatThresh').textContent=Math.min(...vis.map(r=>r.meta?.threshold_kmh??r.crossings[0]?.kmh??'—'));
  document.getElementById('gStatPeak').textContent  =Math.max(...vis.map(r=>r.meta?.peak_kmh??r.crossings[r.crossings.length-1]?.kmh??'—'));
  document.getElementById('gStatDur').textContent   =Math.max(...vis.map(r=>r.meta?.duration_s??r.crossings[r.crossings.length-1]?.time_s??0)).toFixed(2);
  document.getElementById('gStatRuns').textContent  =vis.length;
}
function gRenderLog(){
  const body=document.getElementById('gLogBody');
  const runs=gActiveIdx!==null?[[gActiveIdx,gRuns[gActiveIdx]]]:gRuns.map((r,i)=>[i,r]);
  let html='';
  for(const[i,run]of runs){let prev=null;for(const c of run.crossings){const d=prev!==null?'+'+( c.time_s-prev).toFixed(3)+'s':'—';html+=`<div class="log-row"><div class="log-run" style="color:${run.color}">${run.label}</div><div class="log-kmh">${c.kmh} km/h</div><div class="log-time">T+ ${c.time_s.toFixed(3)}s</div><div class="log-delta">${d}</div></div>`;prev=c.time_s;}}
  body.innerHTML=html||'<div class="empty-msg">nessun dato</div>';
}

// ══════════════════════════════════════════════════════════
// DRAG COMPARE
// ══════════════════════════════════════════════════════════
let dragA=null,dragB=null;

function loadDragSlot(slot,file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.meta?.type!=='drag'){alert('File non è di tipo drag.');return;}
      if(slot==='A'){dragA=d;setSlotUI('A',d,file.name);}
      else          {dragB=d;setSlotUI('B',d,file.name);}
      if(dragA&&dragB)buildComparison();
    }catch{alert('Errore nel leggere il file.')}
  };r.readAsText(file);
}
function setSlotUI(slot,data,filename){
  const id='slot'+slot;
  document.getElementById(id).classList.add('loaded');
  document.getElementById(id).style.borderColor=slot==='A'?'#00e5ff':'#00ff88';
  document.getElementById('slot'+slot+'Name').textContent=filename.replace('.json','');
  document.getElementById('slot'+slot+'Sub').textContent=
    `${data.meta.total_time_s}s | ${data.meta.total_distance_m}m`;
}
function buildComparison(){
  document.getElementById('dragEmptyMsg').style.display='none';
  document.getElementById('dragCompare').classList.add('show');

  // Merge preset names from both runs
  const allPresets=new Set([...dragA.results.map(r=>r.preset),...dragB.results.map(r=>r.preset)]);

  let html=`<div class="cmp-table">
    <div class="cmp-header">
      <div>PRESET</div>
      <div style="color:#00e5ff">RUN A</div>
      <div style="color:#00ff88">RUN B</div>
      <div>DELTA (A→B)</div>
    </div>`;

  for(const pName of allPresets){
    const rA=dragA.results.find(r=>r.preset===pName);
    const rB=dragB.results.find(r=>r.preset===pName);
    const preset=[...dragA.presets,...dragB.presets].find(p=>p.name===pName);
    if(!preset)continue;

    // Primary metric depends on type
    let metricKey,unit,lowerIsBetter;
    if(preset.type==='speed')   {metricKey='time_s';unit='s';lowerIsBetter=true;}
    if(preset.type==='distance'){metricKey='time_s';unit='s';lowerIsBetter=true;}
    if(preset.type==='time')    {metricKey='speed_kmh';unit='km/h';lowerIsBetter=false;}

    const vA=rA?.achieved?rA[metricKey]:null;
    const vB=rB?.achieved?rB[metricKey]:null;

    function fmtCell(r){
      if(!r||!r.achieved)return '<span style="color:var(--muted)">—</span>';
      if(preset.type==='speed')   return `${r.time_s}s | ${r.distance_m}m`;
      if(preset.type==='distance')return `${r.time_s}s | ${r.speed_kmh} km/h`;
      if(preset.type==='time')    return `${r.speed_kmh} km/h | ${r.distance_m}m`;
    }

    let deltaHtml='<span class="cmp-delta same">—</span>';
    if(vA!==null&&vB!==null){
      const delta=vB-vA;
      const pct=(delta/vA*100);
      const better=(lowerIsBetter&&delta<0)||(!lowerIsBetter&&delta>0);
      const sign=delta>0?'+':'';
      const cls=better?'better':(delta===0?'same':'worse');
      const arrow=better?'▲':'▼';
      deltaHtml=`<span class="cmp-delta ${cls}">${arrow} ${sign}${delta.toFixed(3)}${unit}<br><small>${sign}${pct.toFixed(1)}%</small></span>`;
    }

    html+=`<div class="cmp-row">
      <div class="cmp-preset">${pName}</div>
      <div class="cmp-a">${fmtCell(rA)}</div>
      <div class="cmp-b">${fmtCell(rB)}</div>
      ${deltaHtml}
    </div>`;
  }

  // Overall summary
  const oA=dragA.meta,oB=dragB.meta;
  const dtTime=oB.total_time_s-oA.total_time_s;
  const dtDist=oB.total_distance_m-oA.total_distance_m;
  html+=`<div class="cmp-row" style="background:rgba(37,40,48,.4)">
    <div class="cmp-preset" style="font-weight:700">TOTALE</div>
    <div class="cmp-a">${oA.total_time_s}s | ${oA.total_distance_m}m</div>
    <div class="cmp-b">${oB.total_time_s}s | ${oB.total_distance_m}m</div>
    <div class="cmp-delta ${dtTime<0?'better':'worse'}">
      ${dtTime>0?'+':''}${dtTime.toFixed(3)}s<br>
      <small>${dtDist>0?'+':''}${dtDist.toFixed(1)}m</small>
    </div>
  </div>`;

  html+='</div>';
  document.getElementById('cmpTableWrap').innerHTML=html;
}

switchTab('grafico');
</script>
</body>
</html>
